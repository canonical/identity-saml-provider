name: ci
run-name: CI for ${{ github.sha }} on ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v**"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    uses: canonical/identity-team/.github/workflows/_rock-build.yaml@7ec3565943646a4abe70497e354edac4357349a8 # v1.9.3
  unit-test:
    uses: ./.github/workflows/unittest.yaml
  gh-publish:
    if: ${{ (github.ref == 'refs/heads/main') || (github.ref_type == 'tag') }}
    needs: [ build, unit-test ]
    uses: canonical/identity-team/.github/workflows/_rock-gh-publish.yaml@7ec3565943646a4abe70497e354edac4357349a8 # v1.9.3
    with:
      rock: ${{ needs.build.outputs.rock }}
