# SP Mapping Configuration for Identity SAML Provider
# This file defines the OIDC-to-SAML attribute mappings for each Service Provider

# Default mapping applied to all SPs that don't have a specific mapping
default_mapping:
  # NameID format to use in SAML assertions
  # Common values:
  # - "urn:oasis:names:tc:SAML:2.0:nameid-format:transient"
  # - "urn:oasis:names:tc:SAML:2.0:nameid-format:persistent"
  # - "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
  nameid_format: "urn:oasis:names:tc:SAML:2.0:nameid-format:transient"
  
  # Which OIDC claim to use as the NameID value
  nameid_source: "sub"
  
  # Mapping of OIDC claim names to SAML attribute URIs
  # Key: OIDC claim name (from the ID token)
  # Value: SAML attribute URI (the OID URN or friendly name)
  attribute_map:
    email:  "urn:oid:0.9.2342.19200300.100.1.3"      # mail
    name:   "urn:oid:2.16.840.1.113730.3.1.241"      # displayName
    groups: "urn:oid:1.2.840.113556.1.4.221"         # memberOf

  # Optional transformations
  options:
    lowercase_email: false

# Per-Service Provider mappings
service_providers:
  # NetSuite configuration
  http://www.netsuite.com/sp:
    # NetSuite requires emailAddress format for email-based matching
    nameid_format: "urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress"
    nameid_source: "email"
    attribute_map:
      email: "urn:oid:0.9.2342.19200300.100.1.3"    # mail
      name:  "urn:oid:2.5.4.3"                      # cn (common name)
    options:
      lowercase_email: true

  # Example: Another SP with different requirements
  # https://app.example.com/sp:
  #   nameid_format: "urn:oasis:names:tc:SAML:2.0:nameid-format:persistent"
  #   nameid_source: "sub"
  #   attribute_map:
  #     email: "urn:oid:0.9.2342.19200300.100.1.3"
  #     name:  "urn:oid:2.16.840.1.113730.3.1.241"
  #     groups: "urn:oid:1.2.840.113556.1.4.221"
  #   options:
  #     lowercase_email: false
